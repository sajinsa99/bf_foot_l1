# Snippet nginx pour bf_foot_l1.
# install.sh copie ce fichier vers /etc/nginx/snippets/bf_foot_l1_location.conf
# Le vhost bruno inclut tous les snippets via : include /etc/nginx/snippets/*_location.conf;

location /bf_foot_l1/ {
    proxy_pass http://127.0.0.1:5000/bf_foot_l1/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    # SSE support (manage-data scraper output)
    proxy_buffering off;
    proxy_cache off;
    proxy_read_timeout 300s;
}
