# Adds /bf_foot_l1/ to the existing bfablet92.hd.free.fr vhost.
# install.sh copies it to /etc/nginx/snippets/bf_foot_l1_location.conf
# and injects: include /etc/nginx/snippets/bf_foot_l1_location.conf;
# inside the SSL server block of /etc/nginx/sites-available/bruno

location /bf_foot_l1/ {
    proxy_pass http://127.0.0.1:5000/bf_foot_l1/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    # SSE support (manage-data scraper output)
    proxy_buffering off;
    proxy_cache off;
    proxy_read_timeout 300s;
}
