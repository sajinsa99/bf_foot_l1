# Snippet nginx pour bf_foot_l1.
# install.sh copie ce fichier vers /etc/nginx/snippets/bf_foot_l1_location.conf
# Le vhost bruno inclut tous les snippets via : include /etc/nginx/snippets/*_location.conf;
#
# PRÉREQUIS : la directive suivante doit être présente dans le bloc http {} du
# fichier nginx principal (/etc/nginx/nginx.conf) AVANT d'utiliser limit_req
# ci-dessous.  Si elle est absente, nginx -t échoue au rechargement.
#
#   limit_req_zone $binary_remote_addr zone=global:10m rate=10r/s;

location /bf_foot_l1/ {
    proxy_pass http://127.0.0.1:5000/bf_foot_l1/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_hide_header X-Powered-By;
    # SSE support (manage-data scraper output)
    proxy_buffering off;
    proxy_cache off;
    proxy_connect_timeout 10s;
    proxy_read_timeout 300s;
    proxy_send_timeout 60s;
    client_max_body_size 1m;
    limit_req zone=global burst=20 nodelay;
}
